    </marker>
    <path id="trunk" d="M 0,-10 C 20,-10 25,2 25,38 C 25,72 17,86 17,108 C 17,138 23,150 23,168 C 23,182 12,186 0,186 C -12,186 -23,182 -23,168 C -23,150 -17,138 -17,108 C -17,86 -25,72 -25,38 C -25,2 -20,-10 0,-10 Z"/>
    <g id="c04-limbs" fill="none">
      <line x1="316" y1="500" x2="290" y2="499"/>
      <polyline points="316,500 208,468 120,452"/>
      <polyline points="316,500 326,384 334,296"/>
      <polyline points="491,506 636,468 784,452 832,448"/>
      <polyline points="491,506 534,362 684,384 716,392"/>
    </g>
  </defs>

  <g id="mat">
    <rect x="120" y="520" width="780" height="120" rx="32" fill="#D1FAE5" stroke="#1F2937" stroke-width="3" opacity="0.7"/>
  </g>

  <g id="body-end"></g>

  <g id="body-start" stroke-linecap="round" stroke-linejoin="round">
    <use href="#trunk" transform="translate(316 500) rotate(-88)" fill="#E5E7EB" stroke="#1F2937" stroke-width="6"/>
    <use href="#c04-limbs" stroke="#1F2937" stroke-width="40"/>
    <use href="#c04-limbs" stroke="#E5E7EB" stroke-width="28"/>
    <ellipse cx="252" cy="498" rx="29" ry="41" fill="#E5E7EB" stroke="#1F2937" stroke-width="6" transform="rotate(-88 252 498)"/>
  </g>

  <g id="movement-arrows" fill="none" stroke="#2563EB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 150 442 L 96 420" marker-end="url(#ah)"/>
    <path d="M 822 458 L 878 486" marker-end="url(#ah)"/>
