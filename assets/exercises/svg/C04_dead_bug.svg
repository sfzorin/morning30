<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" role="img" aria-labelledby="c04t c04d">
  <title id="c04t">Dead bug</title>
  <desc id="c04d">Схема упражнения: человек лежит на спине, противоположные рука и нога вытягиваются, другие рука и нога согнуты, поясница прижата к коврику.</desc>
