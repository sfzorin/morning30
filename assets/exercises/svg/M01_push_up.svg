<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 768" role="img" aria-labelledby="m01t m01d">
  <title id="m01t">Отжимания классические</title>
  <desc id="m01d">Схема упражнения: верхняя и нижняя позиция отжимания со стрелкой движения вниз-вверх и линией прямого корпуса.</desc>
